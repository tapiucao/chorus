name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Type check (mypy)
        run: mypy core/ web/ agents/ llm/ db/

      - name: Run tests
        run: pytest --tb=short --cov=. --cov-report=term-missing --cov-omit="venv/*,tests/*"
        env:
          LITELLM_LOCAL_MODEL_COST_MAP: "true"
